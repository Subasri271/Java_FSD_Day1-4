<html>
    <body>
        <h1>variable scope</h1>
        <script>
            var a=100;
            console.log("a"+a);
            var a=200;
            console.log("a"+a);
            a=101;
            console.log("a"+a);
            let b=100;
            console.log("b"+b);
            b=101;
            console.log("b"+b);
            const c=200;
            console.log("c"+c);
        </script>
    </body>
</html>
