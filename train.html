<html>
    <body>
        <center>
        <header style="background-color: rgb(67, 43, 226);text-align: center;">TRAIN SEAT ANALYSIS</header>
        <br>
        <input style="text-align: center;" type="number" id="seat" placeholder="Enter your seat number"/>
        <br>
        <br>
        <input style="text-align: center; color:" type="number" id="class" placeholder="Ente your class"/>
        <button onclick="cal()" style="text-align: center;">Enter</button>
        <h1 id="res"></h1>
        </center>
        <script>
            function cal(){
            var s=document.getElementById("seat").value;
            var c=document.getElementById("class").value;
            if(c==3){
            if(s<1 || s>80){
                    document.getElementById("res").textContent="Invalid Seat"
                }
            else{
                let a=s % 8

                if(a===1 || a===4){
                    document.getElementById("res").textContent="Lower";                    
                }
                else if(a===2 || a===5){
                    document.getElementById("res").textContent="Middle";
                }
                else if(a===3 || a===6){
                    document.getElementById("res").textContent="Upper";
                }
                else if(a===7){
                    document.getElementById("res").textContent="side Lower";
                }
                else {
                    document.getElementById("res").textContent="side Upper";
                }
            }
            }
        
            else{
                if(s<1 || s>60){
                    document.getElementById("res").textContent="Invalid Seat"
                }
            else{
                let a=s % 6

                if(a===1 || a===3){
                    document.getElementById("res").textContent="Lower";                    
                }
                else if(a===2 || a===4){
                    document.getElementById("res").textContent="Upper";
                }
                else if(a===5){
                    document.getElementById("res").textContent="side Lower";
                }
                else {
                    document.getElementById("res").textContent="side Upper";
                }
            }

            }
            }
        </script>
        <footer style="background-color: blueviolet;text-align: center;">Created by Subasri M</footer>
    </body>
</html>
