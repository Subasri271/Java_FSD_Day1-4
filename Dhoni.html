<html>
<body bgcolor="pink">

    <header style="background-color:blue; color:white; text-align:center; padding:10px;">
        Calculator
    </header>

    <br>

    <button onclick="c1()">ADD</button>
    <button onclick="c2()">SUBTRACT</button>
    <button onclick="c3()">MULTIPLY</button>
    <button onclick="c4()">DIVISION</button>

    <script>
        let n1 = 5;
        let n2 = 6;

        function c1() {
            alert(n1 + n2);
        }

        function c2() {
            alert(n2 - n1);
        }

        function c3() {
            alert(n1 * n2);
        }

        function c4() {
            alert(n2 / n1);
        }
    </script>

</body>
</html>
